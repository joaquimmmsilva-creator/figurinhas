<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Figurinhas" />
<title>Figurinhas Copa</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --verde: #00B37E;
    --verde-dark: #007F58;
    --vermelho: #E84040;
    --bg: #F7F5F0;
    --card: #FFFFFF;
    --text: #1A1A1A;
    --muted: #7A7570;
    --border: #E5E2DC;
    --radius: 16px;
    --tab-h: 60px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: calc(var(--tab-h) + 24px); }

  .header { background: var(--text); color: #fff; padding: 20px 20px 16px; position: sticky; top: 0; z-index: 10; }
  .header h1 { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; }
  .header p { font-size: 12px; color: #aaa; margin-top: 2px; }

  .metrics { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 16px; }
  .metrics .full { grid-column: 1 / -1; }
  .metric { background: var(--card); border-radius: var(--radius); padding: 14px 16px; border: 1px solid var(--border); }
  .metric-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .metric-value { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 700; }
  .metric-value.green { color: var(--verde); }
  .metric-value.red { color: var(--vermelho); }

  .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: var(--tab-h); background: var(--card); border-top: 1px solid var(--border); display: flex; z-index: 20; padding-bottom: env(safe-area-inset-bottom); }
  .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; font-size: 10px; color: var(--muted); font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; border: none; background: transparent; }
  .tab svg { width: 20px; height: 20px; }
  .tab.active { color: var(--verde-dark); }

  .pane { display: none; padding: 0 16px; }
  .pane.active { display: block; }

  .card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; margin-bottom: 12px; }
  .card-title { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 14px; }

  .field { margin-bottom: 12px; }
  .field label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 5px; font-weight: 500; }
  .field input { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px; font-size: 15px; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); outline: none; -webkit-appearance: none; }
  .field input:focus { border-color: var(--verde); }

  .btn { display: inline-flex; align-items: center; justify-content: center; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--bg); color: var(--text); -webkit-appearance: none; }
  .btn:active { opacity: 0.8; }
  .btn-primary { background: var(--verde); color: #fff; border-color: var(--verde); width: 100%; font-size: 15px; padding: 14px; }
  .btn-secondary { background: var(--card); color: var(--text); border-color: var(--border); width: 100%; font-size: 14px; padding: 12px; margin-top: 8px; }
  .btn-remove { background: transparent; border-color: transparent; color: var(--vermelho); padding: 6px 10px; font-size: 18px; }
  .erro { font-size: 12px; color: var(--vermelho); min-height: 16px; margin-top: 6px; }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: flex-end; }
  .overlay.show { display: flex; }
  .modal { background: var(--card); border-radius: 20px 20px 0 0; padding: 20px 16px 32px; width: 100%; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
  .modal-close { font-size: 22px; color: var(--muted); background: none; border: none; cursor: pointer; line-height: 1; }

  .carrinho-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); gap: 8px; }
  .carrinho-item:last-child { border-bottom: none; }
  .carrinho-nome { font-size: 14px; font-weight: 500; flex: 1; }
  .carrinho-preco { font-size: 12px; color: var(--muted); }
  .carrinho-qtd { display: flex; align-items: center; gap: 8px; }
  .carrinho-num { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; min-width: 24px; text-align: center; }
  .carrinho-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

  .venda-total { background: var(--bg); border-radius: 12px; padding: 14px; margin: 16px 0; }
  .venda-total-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
  .venda-total-row:last-child { margin-bottom: 0; font-weight: 600; font-size: 15px; }

  .hist-day { margin-bottom: 14px; }
  .hist-day-header { background: var(--text); color: #fff; padding: 10px 14px; border-radius: 10px 10px 0 0; display: flex; justify-content: space-between; align-items: center; }
  .hist-day-header-left { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; }
  .hist-day-header-right { font-size: 11px; color: #aaa; }

  .transacao { background: var(--card); border-left: 1px solid var(--border); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .transacao:last-child { border-radius: 0 0 10px 10px; }
  .transacao-header { padding: 12px 14px 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
  .transacao-info { flex: 1; }
  .transacao-num { font-size: 11px; color: var(--muted); font-weight: 500; }
  .transacao-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .transacao-valores { text-align: right; }
  .transacao-receita { font-size: 14px; font-weight: 600; }
  .transacao-lucro { font-size: 11px; margin-top: 2px; }
  .transacao-itens { padding: 0 14px 12px; display: none; }
  .transacao-itens.open { display: block; }
  .transacao-item { font-size: 12px; color: var(--muted); padding: 4px 0; border-top: 1px dashed var(--border); }

  .tipo-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); gap: 10px; }
  .tipo-row:last-child { border-bottom: none; }
  .tipo-info { flex: 1; min-width: 0; }
  .tipo-nome { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tipo-detalhe { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .tipo-preco { display: flex; align-items: center; gap: 4px; }
  .tipo-preco span { font-size: 12px; color: var(--muted); }
  .tipo-preco input { width: 64px; padding: 6px 8px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); outline: none; text-align: right; }
  .tipo-preco input:focus { border-color: var(--verde); }

  .saving-wrap { text-align: right; font-size: 11px; color: var(--muted); min-height: 16px; margin-bottom: 8px; }
  .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; line-height: 1.6; }
  .lucro-pos { color: var(--verde); }
  .lucro-neg { color: var(--vermelho); }
</style>
</head>
<body>

<div class="header">
  <h1>Figurinhas Copa</h1>
  <p id="header-date"></p>
</div>

<div class="metrics" id="metrics"></div>

<!-- PANE: VENDAS -->
<div class="pane active" id="pane-vendas">
  <div style="padding: 0 0 12px">
    <button class="btn btn-primary" onclick="abrirModal()">+ Registrar venda</button>
  </div>
  <div id="fig-resumo"></div>
  <div class="empty" id="empty-vendas" style="display:none">Cadastre figurinhas na aba <strong>Tipos</strong> primeiro.</div>
</div>

<!-- PANE: HISTORICO -->
<div class="pane" id="pane-hist">
  <div id="hist-list"></div>
  <div class="empty" id="empty-hist" style="display:none">Nenhuma venda registrada ainda.</div>
</div>

<!-- PANE: TIPOS -->
<div class="pane" id="pane-tipos">
  <div class="card">
    <div class="card-title">Nova figurinha</div>
    <div class="field">
      <label>Nome / numero</label>
      <input type="text" id="inp-nome" placeholder="ex: Vinicius Jr #87" />
    </div>
    <div class="field">
      <label>Preco de venda (R$)</label>
      <input type="number" id="inp-preco" min="0.01" step="0.01" value="3.00" inputmode="decimal" />
    </div>
    <button class="btn btn-primary" onclick="adicionarTipo()">+ Adicionar figurinha</button>
    <div class="erro" id="erro"></div>
  </div>
  <div class="card">
    <div class="card-title">Figurinhas cadastradas</div>
    <div class="saving-wrap" id="saving-msg"></div>
    <div id="tipos-list"></div>
    <div class="empty" id="empty-tipos" style="display:none">Nenhuma figurinha cadastrada.</div>
  </div>
</div>

<!-- MODAL VENDA -->
<div class="overlay" id="overlay" onclick="fecharModalFora(event)">
  <div class="modal" id="modal">
    <div class="modal-title">
      Nova venda
      <button class="modal-close" onclick="fecharModal()">x</button>
    </div>
    <div id="carrinho-list"></div>
    <div class="venda-total" id="venda-total" style="display:none">
      <div class="venda-total-row"><span>Total de figurinhas</span><span id="tot-qtd">0</span></div>
      <div class="venda-total-row"><span>Receita</span><span id="tot-receita">R$ 0,00</span></div>
      <div class="venda-total-row"><span>Custo</span><span id="tot-custo">R$ 0,00</span></div>
      <div class="venda-total-row"><span>Lucro</span><span id="tot-lucro" class="lucro-pos">R$ 0,00</span></div>
    </div>
    <button class="btn btn-primary" id="btn-confirmar" onclick="confirmarVenda()" style="display:none">Confirmar venda</button>
    <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
  </div>
</div>

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tab active" id="tab-vendas" onclick="showTab('vendas')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
    Vendas
  </button>
  <button class="tab" id="tab-hist" onclick="showTab('hist')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Historico
  </button>
  <button class="tab" id="tab-tipos" onclick="showTab('tipos')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/></svg>
    Tipos
  </button>
</div>

<script>
const CUSTO = 1.00;
const KEY_FIGS = 'fig_v5_figs';
const KEY_TRANS = 'fig_v5_trans';
let figs = [];
let transacoes = [];
let carrinho = {};
let editandoId = null;
let saveTimer = null;

function hoje() { const d = new Date(); return d.toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit',year:'numeric'}); }
function hojeISO() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function horaAtual() { const d = new Date(); return d.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'}); }
function fmt(v) { return 'R$ ' + v.toFixed(2).replace('.', ','); }

function carregar() {
  try { const r = localStorage.getItem(KEY_FIGS); if (r) figs = JSON.parse(r); } catch(e) { figs = []; }
  try { const r = localStorage.getItem(KEY_TRANS); if (r) transacoes = JSON.parse(r); } catch(e) { transacoes = []; }
  document.getElementById('header-date').textContent = 'Custo fixo: R$ 1,00  ·  Hoje: ' + hoje();
  renderizar();
}

function salvar() {
  const msg = document.getElementById('saving-msg');
  try {
    localStorage.setItem(KEY_FIGS, JSON.stringify(figs));
    localStorage.setItem(KEY_TRANS, JSON.stringify(transacoes));
    msg.textContent = 'Salvo';
    setTimeout(() => msg.textContent = '', 1500);
  } catch(e) { msg.textContent = 'Erro ao salvar'; }
}
function salvarD() { clearTimeout(saveTimer); document.getElementById('saving-msg').textContent = 'Salvando...'; saveTimer = setTimeout(salvar, 600); }

function showTab(t) {
  ['vendas','hist','tipos'].forEach(id => {
    document.getElementById('pane-' + id).classList.toggle('active', id === t);
    document.getElementById('tab-' + id).classList.toggle('active', id === t);
  });
}

function adicionarTipo() {
  const nome = document.getElementById('inp-nome').value.trim();
  const preco = parseFloat(document.getElementById('inp-preco').value) || 0;
  const erro = document.getElementById('erro');
  if (!nome) { erro.textContent = 'Informe o nome ou numero.'; return; }
  if (preco <= 0) { erro.textContent = 'Preco deve ser maior que zero.'; return; }
  erro.textContent = '';
  figs.push({ id: Date.now(), nome, preco, vendidas: 0 });
  salvarD();
  document.getElementById('inp-nome').value = '';
  document.getElementById('inp-preco').value = '3.00';
  renderizar();
}

function remover(id) {
  if (!confirm('Remover esta figurinha?')) return;
  figs = figs.filter(f => f.id !== id);
  salvarD(); renderizar();
}

function atualizarPreco(id, val) {
  const f = figs.find(f => f.id === id);
  const v = parseFloat(val);
  if (f && v > 0) { f.preco = v; salvarD(); renderizar(); }
}

function abrirModal() {
  carrinho = {};
  editandoId = null;
  figs.forEach(f => carrinho[f.id] = 0);
  renderCarrinho();
  document.getElementById('btn-confirmar').textContent = 'Confirmar venda';
  document.getElementById('overlay').classList.add('show');
}

function fecharModal() { document.getElementById('overlay').classList.remove('show'); }
function fecharModalFora(e) { if (e.target === document.getElementById('overlay')) fecharModal(); }

function alterarCarrinho(id, delta) {
  carrinho[id] = Math.max(0, (carrinho[id] || 0) + delta);
  renderCarrinho();
}

function renderCarrinho() {
  const list = document.getElementById('carrinho-list');
  list.innerHTML = '';
  let totalQtd = 0, totalReceita = 0, totalCusto = 0;

  figs.forEach(f => {
    const qtd = carrinho[f.id] || 0;
    totalQtd += qtd;
    totalReceita += qtd * f.preco;
    totalCusto += qtd * CUSTO;

    const div = document.createElement('div');
    div.className = 'carrinho-item';
    div.innerHTML = `
      <div style="flex:1;min-width:0">
        <div class="carrinho-nome">${f.nome}</div>
        <div class="carrinho-preco">${fmt(f.preco)} cada</div>
      </div>
      <div class="carrinho-qtd">
        <button class="carrinho-btn" onclick="alterarCarrinho(${f.id},-1)">-</button>
        <span class="carrinho-num">${qtd}</span>
        <button class="carrinho-btn" onclick="alterarCarrinho(${f.id},1)">+</button>
      </div>
    `;
    list.appendChild(div);
  });

  const lucro = totalReceita - totalCusto;
  const temItens = totalQtd > 0;
  document.getElementById('venda-total').style.display = temItens ? 'block' : 'none';
  document.getElementById('btn-confirmar').style.display = temItens ? 'flex' : 'none';

  if (temItens) {
    document.getElementById('tot-qtd').textContent = totalQtd;
    document.getElementById('tot-receita').textContent = fmt(totalReceita);
    document.getElementById('tot-custo').textContent = fmt(totalCusto);
    const el = document.getElementById('tot-lucro');
    el.textContent = fmt(lucro);
    el.className = lucro >= 0 ? 'lucro-pos' : 'lucro-neg';
  }
}

function confirmarVenda() {
  const itens = [];
  let totalReceita = 0, totalCusto = 0;

  if (editandoId) {
    // Reverte vendidas da transacao original
    const original = transacoes.find(t => t.id === editandoId);
    if (original) {
      original.itens.forEach(item => {
        const f = figs.find(f => f.id === item.figId);
        if (f) f.vendidas = Math.max(0, f.vendidas - item.qtd);
      });
    }
  }

  figs.forEach(f => {
    const qtd = carrinho[f.id] || 0;
    if (qtd > 0) {
      itens.push({ figId: f.id, nome: f.nome, preco: f.preco, qtd });
      totalReceita += qtd * f.preco;
      totalCusto += qtd * CUSTO;
      f.vendidas += qtd;
    }
  });

  if (itens.length === 0) { fecharModal(); salvarD(); renderizar(); return; }

  if (editandoId) {
    const idx = transacoes.findIndex(t => t.id === editandoId);
    if (idx !== -1) {
      transacoes[idx] = { ...transacoes[idx], itens, totalReceita, totalCusto, lucro: totalReceita - totalCusto };
    }
  } else {
    transacoes.push({
      id: Date.now(),
      data: hojeISO(),
      dataFormatada: hoje(),
      hora: horaAtual(),
      itens,
      totalReceita,
      totalCusto,
      lucro: totalReceita - totalCusto
    });
  }

  editandoId = null;
  fecharModal();
  salvarD();
  renderizar();
}

function removerTransacao(id) {
  if (!confirm('Remover esta venda do historico?')) return;
  const t = transacoes.find(t => t.id === id);
  if (t) {
    t.itens.forEach(item => {
      const f = figs.find(f => f.id === item.figId);
      if (f) f.vendidas = Math.max(0, f.vendidas - item.qtd);
    });
    transacoes = transacoes.filter(t => t.id !== id);
  }
  salvarD(); renderizar();
}

function toggleTransacao(el) {
  const pai = el.closest('.transacao');
  if (!pai) return;
  const itens = pai.querySelector('.transacao-itens');
  if (itens) itens.classList.toggle('open');
}

function abrirEdicao(id) {
  const t = transacoes.find(t => t.id === id);
  if (!t) return;
  carrinho = {};
  figs.forEach(f => carrinho[f.id] = 0);
  t.itens.forEach(it => { if (carrinho[it.figId] !== undefined) carrinho[it.figId] = it.qtd; });
  editandoId = id;
  renderCarrinho();
  document.getElementById('btn-confirmar').textContent = 'Salvar alteracoes';
  document.getElementById('overlay').classList.add('show');
}

function renderizar() {
  renderResumo();
  renderTipos();
  renderHistorico();
  renderMetrics();
}

function renderResumo() {
  const el = document.getElementById('fig-resumo');
  const empty = document.getElementById('empty-vendas');
  if (figs.length === 0) { el.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  el.innerHTML = `
    <div class="card">
      <div class="card-title">Resumo por figurinha</div>
      ${figs.map(f => {
        const lucro = f.vendidas * (f.preco - CUSTO);
        return `<div class="tipo-row">
          <div class="tipo-info">
            <div class="tipo-nome">${f.nome}</div>
            <div class="tipo-detalhe">${f.vendidas} vendida${f.vendidas !== 1 ? 's' : ''} · ${fmt(f.preco)} cada</div>
          </div>
          <div style="font-size:13px;font-weight:600;color:${lucro >= 0 ? 'var(--verde)' : 'var(--vermelho)'}">${fmt(lucro)}</div>
        </div>`;
      }).join('')}
    </div>
  `;
}

function renderTipos() {
  const list = document.getElementById('tipos-list');
  const empty = document.getElementById('empty-tipos');
  list.innerHTML = '';
  if (figs.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  figs.forEach(f => {
    const div = document.createElement('div');
    div.className = 'tipo-row';
    div.innerHTML = `
      <div class="tipo-info">
        <div class="tipo-nome">${f.nome}</div>
        <div class="tipo-detalhe">${f.vendidas} vendida${f.vendidas !== 1 ? 's' : ''}</div>
      </div>
      <div class="tipo-preco">
        <span>R$</span>
        <input type="number" min="0.01" step="0.01" inputmode="decimal" value="${f.preco.toFixed(2)}" onchange="atualizarPreco(${f.id}, this.value)" />
      </div>
      <button class="btn btn-remove" onclick="remover(${f.id})">x</button>
    `;
    list.appendChild(div);
  });
}

function renderHistorico() {
  const list = document.getElementById('hist-list');
  const empty = document.getElementById('empty-hist');
  list.innerHTML = '';
  if (transacoes.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  const porData = {};
  transacoes.forEach(t => { if (!porData[t.data]) porData[t.data] = []; porData[t.data].push(t); });
  const datas = Object.keys(porData).sort((a, b) => b.localeCompare(a));

  datas.forEach(data => {
    const lista = porData[data].sort((a,b) => b.id - a.id);
    const lucroTotal = lista.reduce((s, t) => s + t.lucro, 0);
    const isHoje = data === hojeISO();

    const dayDiv = document.createElement('div');
    dayDiv.className = 'hist-day';

    const hdr = document.createElement('div');
    hdr.className = 'hist-day-header';
    hdr.innerHTML = '<span class="hist-day-header-left">' + (isHoje ? 'Hoje - ' : '') + lista[0].dataFormatada + '</span>' +
      '<span class="hist-day-header-right">' + lista.length + ' venda' + (lista.length !== 1 ? 's' : '') + ' · Lucro: ' + fmt(lucroTotal) + '</span>';
    dayDiv.appendChild(hdr);

    lista.forEach((t, i) => {
      const totalFigs = t.itens.reduce((s,it) => s+it.qtd, 0);

      const transDiv = document.createElement('div');
      transDiv.className = 'transacao';

      const transHdr = document.createElement('div');
      transHdr.className = 'transacao-header';
      transHdr.innerHTML = '<div class="transacao-info"><div class="transacao-num">Venda ' + (lista.length - i) + ' · ' + (t.hora || '') + '</div>' +
        '<div class="transacao-desc">' + totalFigs + ' figurinha' + (totalFigs !== 1 ? 's' : '') + ' · toque para detalhes</div></div>' +
        '<div class="transacao-valores"><div class="transacao-receita">' + fmt(t.totalReceita) + '</div>' +
        '<div class="transacao-lucro ' + (t.lucro >= 0 ? 'lucro-pos' : 'lucro-neg') + '">Lucro: ' + fmt(t.lucro) + '</div></div>';

      const transItens = document.createElement('div');
      transItens.className = 'transacao-itens';

      t.itens.forEach(it => {
        const d = document.createElement('div');
        d.className = 'transacao-item';
        d.textContent = it.qtd + 'x ' + it.nome + ' · ' + fmt(it.preco) + ' cada · Lucro: ' + fmt(it.qtd * (it.preco - CUSTO));
        transItens.appendChild(d);
      });

      const btns = document.createElement('div');
      btns.style.cssText = 'margin-top:10px;display:flex;gap:8px;justify-content:flex-end';

      const btnE = document.createElement('button');
      btnE.className = 'btn';
      btnE.style.cssText = 'font-size:12px;padding:6px 12px';
      btnE.textContent = 'Editar';
      btnE.addEventListener('click', (e) => { e.stopPropagation(); abrirEdicao(t.id); });

      const btnR = document.createElement('button');
      btnR.className = 'btn';
      btnR.style.cssText = 'font-size:12px;padding:6px 12px;color:var(--vermelho);border-color:var(--vermelho)';
      btnR.textContent = 'Remover';
      btnR.addEventListener('click', (e) => { e.stopPropagation(); removerTransacao(t.id); });

      btns.appendChild(btnE);
      btns.appendChild(btnR);
      transItens.appendChild(btns);

      transHdr.addEventListener('click', () => transItens.classList.toggle('open'));

      transDiv.appendChild(transHdr);
      transDiv.appendChild(transItens);
      dayDiv.appendChild(transDiv);
    });

    list.appendChild(dayDiv);
  });
}

function renderMetrics() {
  const hojeStr = hojeISO();
  const transHoje = transacoes.filter(t => t.data === hojeStr);
  const lucroHoje = transHoje.reduce((s, t) => s + t.lucro, 0);
  const vendasHoje = transHoje.reduce((s, t) => s + t.itens.reduce((ss, it) => ss + it.qtd, 0), 0);

  let tRec = 0, tCusto = 0;
  figs.forEach(f => { tRec += f.vendidas * f.preco; tCusto += f.vendidas * CUSTO; });
  const lucroTotal = tRec - tCusto;

  document.getElementById('metrics').innerHTML = `
    <div class="metric">
      <div class="metric-label">Vendidas hoje</div>
      <div class="metric-value">${vendasHoje}</div>
    </div>
    <div class="metric">
      <div class="metric-label">Lucro hoje</div>
      <div class="metric-value ${lucroHoje >= 0 ? 'green' : 'red'}" style="font-size:20px">R$ ${lucroHoje.toFixed(2).replace('.',',')}</div>
    </div>
    <div class="metric">
      <div class="metric-label">Receita total</div>
      <div class="metric-value" style="font-size:20px">R$ ${tRec.toFixed(2).replace('.',',')}</div>
    </div>
    <div class="metric full">
      <div class="metric-label">Lucro liquido total</div>
      <div class="metric-value ${lucroTotal >= 0 ? 'green' : 'red'}" style="font-size:28px">R$ ${lucroTotal.toFixed(2).replace('.',',')}</div>
    </div>
  `;
}

carregar();
</script>
</body>
</html>
