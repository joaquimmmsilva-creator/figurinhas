<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Figurinhas" />
<title>Figurinhas Copa</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --verde: #00B37E;
    --verde-dark: #007F58;
    --vermelho: #E84040;
    --bg: #F7F5F0;
    --card: #FFFFFF;
    --text: #1A1A1A;
    --muted: #7A7570;
    --border: #E5E2DC;
    --radius: 16px;
    --tab-h: 56px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: calc(var(--tab-h) + 24px);
  }

  /* HEADER */
  .header {
    background: var(--text);
    color: #fff;
    padding: 20px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .header p { font-size: 12px; color: #aaa; margin-top: 2px; }

  /* METRICS */
  .metrics {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    padding: 16px;
  }
  .metrics .full { grid-column: 1 / -1; }
  .metric {
    background: var(--card);
    border-radius: var(--radius);
    padding: 14px 16px;
    border: 1px solid var(--border);
  }
  .metric-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .metric-value { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 700; }
  .metric-value.green { color: var(--verde); }
  .metric-value.red { color: var(--vermelho); }

  /* TAB BAR */
  .tab-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--tab-h);
    background: var(--card);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 20;
  }
  .tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    border: none;
    background: transparent;
    transition: color 0.15s;
  }
  .tab svg { width: 22px; height: 22px; }
  .tab.active { color: var(--verde-dark); }
  .tab.active svg path, .tab.active svg rect, .tab.active svg circle { stroke: var(--verde-dark); }

  /* PANES */
  .pane { display: none; padding: 0 16px; }
  .pane.active { display: block; }

  /* CARDS */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 16px;
    margin-bottom: 12px;
  }
  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 14px;
  }

  /* INPUTS */
  .field { margin-bottom: 12px; }
  .field label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 5px; font-weight: 500; }
  .field input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus { border-color: var(--verde); }

  /* BUTTONS */
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    transition: all 0.15s;
    -webkit-appearance: none;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--verde); color: #fff; border-color: var(--verde); width: 100%; font-size: 15px; padding: 14px; }
  .btn-primary:active { background: var(--verde-dark); }
  .btn-icon { padding: 8px; border-radius: 8px; font-size: 18px; line-height: 1; min-width: 38px; }
  .btn-remove { background: transparent; border-color: transparent; color: var(--vermelho); padding: 6px 10px; font-size: 18px; }

  /* ERRO */
  .erro { font-size: 12px; color: var(--vermelho); min-height: 16px; margin-top: 6px; }

  /* FIG CARDS (vendas) */
  .fig-list { display: flex; flex-direction: column; gap: 10px; }
  .fig-card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 14px 16px;
  }
  .fig-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .fig-name { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 600; }
  .fig-price-tag {
    background: #F0F9F5;
    color: var(--verde-dark);
    font-size: 12px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 99px;
  }
  .fig-body { display: flex; align-items: center; justify-content: space-between; }
  .fig-count-wrap { display: flex; flex-direction: column; }
  .fig-count-label { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
  .fig-count { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 700; line-height: 1; }
  .fig-controls { display: flex; gap: 8px; align-items: center; }
  .fig-lucro { font-size: 12px; font-weight: 500; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .lucro-pos { color: var(--verde); }
  .lucro-neg { color: var(--vermelho); }

  /* TABELA TIPOS */
  .tipo-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    gap: 10px;
  }
  .tipo-row:last-child { border-bottom: none; }
  .tipo-info { flex: 1; min-width: 0; }
  .tipo-nome { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tipo-detalhe { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .tipo-preco { display: flex; align-items: center; gap: 4px; }
  .tipo-preco span { font-size: 12px; color: var(--muted); }
  .tipo-preco input {
    width: 64px;
    padding: 6px 8px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    outline: none;
    text-align: right;
  }
  .tipo-preco input:focus { border-color: var(--verde); }

  /* SAVING INDICATOR */
  .saving-wrap { text-align: right; font-size: 11px; color: var(--muted); min-height: 16px; margin-bottom: 8px; }

  /* EMPTY */
  .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
  .empty-icon { font-size: 40px; margin-bottom: 8px; }
</style>
</head>
<body>

<div class="header">
  <h1>⚽ Figurinhas Copa</h1>
  <p>Custo fixo: R$ 1,00 por figurinha</p>
</div>

<div class="metrics" id="metrics"></div>

<!-- PANE: VENDAS -->
<div class="pane active" id="pane-vendas">
  <div id="fig-list" class="fig-list"></div>
  <div class="empty" id="empty-vendas" style="display:none">
    <div class="empty-icon">🗂️</div>
    Cadastre figurinhas na aba<br><strong>Tipos</strong> primeiro.
  </div>
</div>

<!-- PANE: TIPOS -->
<div class="pane" id="pane-tipos">
  <div class="card">
    <div class="card-title">Nova figurinha</div>
    <div class="field">
      <label>Nome / número</label>
      <input type="text" id="inp-nome" placeholder="ex: Vinicius Jr #87" />
    </div>
    <div class="field">
      <label>Preço de venda (R$)</label>
      <input type="number" id="inp-preco" min="0.01" step="0.01" value="3.00" inputmode="decimal" />
    </div>
    <button class="btn btn-primary" onclick="adicionarTipo()">+ Adicionar figurinha</button>
    <div class="erro" id="erro"></div>
  </div>

  <div class="card">
    <div class="card-title">Figurinhas cadastradas</div>
    <div class="saving-wrap" id="saving-msg"></div>
    <div id="tipos-list"></div>
    <div class="empty" id="empty-tipos" style="display:none">
      <div class="empty-icon">📋</div>
      Nenhuma figurinha cadastrada.
    </div>
  </div>
</div>

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tab active" id="tab-vendas" onclick="showTab('vendas')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
      <path d="M12 8v8M8 12h8"/>
    </svg>
    Vendas
  </button>
  <button class="tab" id="tab-tipos" onclick="showTab('tipos')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="3"/>
      <path d="M3 9h18M9 21V9"/>
    </svg>
    Tipos
  </button>
</div>

<script>
const CUSTO = 1.00;
const KEY = 'figurinhas_copa_v1';
let figs = [];
let saveTimer = null;

function carregar() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) figs = JSON.parse(raw);
  } catch(e) { figs = []; }
  renderizar();
}

function salvar() {
  const msg = document.getElementById('saving-msg');
  try {
    localStorage.setItem(KEY, JSON.stringify(figs));
    msg.textContent = 'Salvo ✓';
    setTimeout(() => msg.textContent = '', 1500);
  } catch(e) {
    msg.textContent = 'Erro ao salvar';
  }
}

function salvarD() {
  clearTimeout(saveTimer);
  document.getElementById('saving-msg').textContent = 'Salvando...';
  saveTimer = setTimeout(salvar, 600);
}

function showTab(t) {
  ['vendas','tipos'].forEach(id => {
    document.getElementById('pane-' + id).classList.toggle('active', id === t);
    document.getElementById('tab-' + id).classList.toggle('active', id === t);
  });
}

function adicionarTipo() {
  const nome = document.getElementById('inp-nome').value.trim();
  const preco = parseFloat(document.getElementById('inp-preco').value) || 0;
  const erro = document.getElementById('erro');
  if (!nome) { erro.textContent = 'Informe o nome ou número.'; return; }
  if (preco <= 0) { erro.textContent = 'Preço deve ser maior que zero.'; return; }
  erro.textContent = '';
  figs.push({ id: Date.now(), nome, preco, vendidas: 0 });
  salvarD();
  document.getElementById('inp-nome').value = '';
  document.getElementById('inp-preco').value = '3.00';
  renderizar();
}

function remover(id) {
  if (!confirm('Remover esta figurinha?')) return;
  figs = figs.filter(f => f.id !== id);
  salvarD(); renderizar();
}

function vender(id, delta) {
  const f = figs.find(f => f.id === id);
  if (!f) return;
  const novo = f.vendidas + delta;
  if (novo < 0) return;
  f.vendidas = novo;
  salvarD(); renderizar();
}

function atualizarPreco(id, val) {
  const f = figs.find(f => f.id === id);
  const v = parseFloat(val);
  if (f && v > 0) { f.preco = v; salvarD(); renderizar(); }
}

function fmt(v) { return 'R$ ' + v.toFixed(2).replace('.', ','); }

function renderizar() {
  renderVendas();
  renderTipos();
  renderMetrics();
}

function renderVendas() {
  const list = document.getElementById('fig-list');
  const empty = document.getElementById('empty-vendas');
  list.innerHTML = '';
  if (figs.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  figs.forEach(f => {
    const lucro = f.vendidas * (f.preco - CUSTO);
    const div = document.createElement('div');
    div.className = 'fig-card';
    div.innerHTML = `
      <div class="fig-header">
        <div class="fig-name">${f.nome}</div>
        <div class="fig-price-tag">${fmt(f.preco)}</div>
      </div>
      <div class="fig-body">
        <div class="fig-count-wrap">
          <div class="fig-count-label">VENDIDAS</div>
          <div class="fig-count">${f.vendidas}</div>
        </div>
        <div class="fig-controls">
          <button class="btn btn-icon" onclick="vender(${f.id},-1)" style="font-size:22px">−</button>
          <button class="btn btn-icon btn-primary" onclick="vender(${f.id},1)" style="font-size:22px;padding:8px 14px">+ Vendi</button>
        </div>
      </div>
      <div class="fig-lucro ${lucro >= 0 ? 'lucro-pos' : 'lucro-neg'}">
        Lucro: ${fmt(lucro)}
      </div>
    `;
    list.appendChild(div);
  });
}

function renderTipos() {
  const list = document.getElementById('tipos-list');
  const empty = document.getElementById('empty-tipos');
  list.innerHTML = '';
  if (figs.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  figs.forEach(f => {
    const div = document.createElement('div');
    div.className = 'tipo-row';
    div.innerHTML = `
      <div class="tipo-info">
        <div class="tipo-nome">${f.nome}</div>
        <div class="tipo-detalhe">${f.vendidas} vendida${f.vendidas !== 1 ? 's' : ''} · Custo R$ 1,00</div>
      </div>
      <div class="tipo-preco">
        <span>R$</span>
        <input type="number" min="0.01" step="0.01" inputmode="decimal"
          value="${f.preco.toFixed(2)}"
          onchange="atualizarPreco(${f.id}, this.value)" />
      </div>
      <button class="btn btn-remove" onclick="remover(${f.id})">✕</button>
    `;
    list.appendChild(div);
  });
}

function renderMetrics() {
  let tVend = 0, tRec = 0, tCusto = 0;
  figs.forEach(f => {
    tVend += f.vendidas;
    tRec += f.vendidas * f.preco;
    tCusto += f.vendidas * CUSTO;
  });
  const lucro = tRec - tCusto;
  document.getElementById('metrics').innerHTML = `
    <div class="metric">
      <div class="metric-label">Total vendidas</div>
      <div class="metric-value">${tVend}</div>
    </div>
    <div class="metric">
      <div class="metric-label">Tipos</div>
      <div class="metric-value">${figs.length}</div>
    </div>
    <div class="metric">
      <div class="metric-label">Receita total</div>
      <div class="metric-value" style="font-size:20px">R$ ${tRec.toFixed(2).replace('.',',')}</div>
    </div>
    <div class="metric full">
      <div class="metric-label">Lucro líquido</div>
      <div class="metric-value ${lucro >= 0 ? 'green' : 'red'}" style="font-size:28px">R$ ${lucro.toFixed(2).replace('.',',')}</div>
    </div>
  `;
}

carregar();
</script>
</body>
</html>
